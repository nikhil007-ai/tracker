name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'   # 🔥 upgrade from 18
          cache: 'npm'
      
      - name: Clean install (fix Tailwind oxide)
        run: |
          rm -rf node_modules package-lock.json
          npm install --include=optional
          npm rebuild
      
      - name: Build project
        run: npm run build
        env:
          GITHUB_PAGES: 'true'
      
      - name: Deploy to GitHub Pages
        uses: :contentReference[oaicite:1]{index=1}@v3
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
